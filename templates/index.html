<!DOCTYPE html>
<html lang="en">
<head>
    <title>AIDE HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-primary mb-4">AIDE HR: Career Trends & Interviews</h2>
        <div id="data-container" class="row">
            </div>
    </div>

    <script>
        // Ye script aapke API se data khinch kar layegi
        fetch('/api/gd-topics')
            .then(res => res.json())
            .then(response => {
                const container = document.getElementById('data-container');
                response.data.forEach(item => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title">${item.title}</h5>
                                    <span class="badge bg-info">${item.source}</span>
                                    <p class="mt-2 text-muted">Status: ${item.status}</p>
                                </div>
                            </div>
                        </div>`;
                });
            });
    </script>
</body>
</html>
